<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpikiTech Bootcamp CRM</title>
    <style>
      #root:empty,
      .deploy-fallback {
        align-items: center;
        background: #f6f7f4;
        color: #17211b;
        display: flex;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }

      .deploy-fallback__panel {
        background: #ffffff;
        border: 1px solid #dfe6d8;
        border-radius: 8px;
        box-shadow: 0 18px 60px rgba(23, 33, 27, 0.08);
        max-width: 520px;
        padding: 28px;
      }

      .deploy-fallback__panel h1 {
        font-size: 1.5rem;
        margin: 0 0 10px;
      }

      .deploy-fallback__panel p {
        color: #5b6756;
        line-height: 1.5;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="deploy-fallback">
        <section class="deploy-fallback__panel">
          <h1>SpikiTech CRM is loading</h1>
          <p>If this message stays on screen, the hosting platform is serving raw source files. Set the build command to npm run build and the output folder to dist.</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
